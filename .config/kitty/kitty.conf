# vim:fileencoding=utf-8:foldmethod=marker

# --- Fonts ---
font_family      Jetbrains Mono
bold_font        auto
italic_font      auto
bold_italic_font auto
font_size        13.0
adjust_line_height 110%

# --- Window Layout ---
window_padding_width 15
background_opacity 1
background_blur 20
dynamic_background_opacity yes
hide_window_decorations yes
macos_option_as_alt yes
macos_titlebar_color background
macos_traditional_fullscreen yes
macos_show_window_title_in menubar
confirm_os_window_close 0
remember_window_size  yes
initial_window_width  1000
initial_window_height 650

# --- Cursor ---
cursor_shape beam
cursor_blink_interval 0.5

# --- Tab Bar ---
tab_bar_edge bottom
tab_bar_style custom
tab_bar_margin_width 0.0
tab_bar_margin_height 0.0 0.0
tab_bar_min_tabs 1
active_tab_font_style bold
inactive_tab_font_style normal

# --- Mouse ---
copy_on_select yes
focus_on_mouse_move no

# --- Performance ---
repaint_delay 10
input_delay 3
sync_to_monitor yes

# --- Layouts ---
enabled_layouts splits,stack,tall,fat

# --- Keyboard Shortcuts ---

# Tab Switching (Cmd + Number)
map cmd+1 goto_tab 1
map cmd+2 goto_tab 2
map cmd+3 goto_tab 3
map cmd+4 goto_tab 4
map cmd+5 goto_tab 5
map cmd+6 goto_tab 6
map cmd+7 goto_tab 7
map cmd+8 goto_tab 8
map cmd+9 goto_tab 9

# Font size control
map cmd+plus change_font_size all +2.0
map cmd+kp_add change_font_size all +2.0
map cmd+minus change_font_size all -2.0
map cmd+kp_subtract change_font_size all -2.0
map cmd+equal change_font_size all 0

# Tab Management
map cmd+t new_tab_with_cwd
map cmd+w close_tab
map cmd+right next_tab
map cmd+left previous_tab
map cmd+shift+right move_tab_forward
map cmd+shift+left move_tab_backward

# Window Splitting (Productive)
map cmd+enter launch --location=vsplit --cwd=current
map cmd+shift+enter launch --location=hsplit --cwd=current

# Window Navigation
map cmd+j neighboring_window down
map cmd+k neighboring_window up
map cmd+h neighboring_window left
map cmd+l neighboring_window right

# Window Resizing
map cmd+shift+h resize_window narrower
map cmd+shift+l resize_window wider
map cmd+shift+k resize_window taller
map cmd+shift+j resize_window shorter

# Window Management
map cmd+ctrl+f toggle_fullscreen
map cmd+f11 toggle_fullscreen

# Reload Config
map cmd+ctrl+, load_config_file

# Search (Paul Nameless's Elite Vim-Ansi version)
map cmd+f pipe @ansi overlay /Users/abish/.config/kitty/vim-ansi.sh

# Broadcast (Type in all windows in tab)
map cmd+alt+b launch --type=overlay --stdin-source=@screen_scrollback kitty +kitten broadcast

# Zoom / Stack layout toggle
map cmd+z toggle_layout stack

# --- Advanced Features ---
allow_remote_control yes
listen_on unix:/tmp/mykitty
shell_integration enabled

# Unicode input
map cmd+ctrl+u kitten unicode_input

# --- Hints ---
map cmd+e open_url_with_hints
map cmd+p kitten hints --type path --program -
map cmd+shift+p kitten hints --type path --program - --multiple
map cmd+g kitten hints --type hash --program -
map cmd+f1 kitten hints --type line --program -
map cmd+shift+c kitten hints --type path --program @
map cmd+i launch --type=overlay kitty +kitten icat --hold .
map cmd+shift+s launch --type=overlay --cwd=current

# Background Opacity Control
map cmd+opt+equal set_background_opacity +0.05
map cmd+opt+minus set_background_opacity -0.05
map cmd+opt+0 set_background_opacity default

# Clear line
map cmd+backspace send_text all \x15

foreground               #cdcdcd
background               #141415
selection_foreground     #cdcdcd
selection_background     #252530
cursor                   none
url_color                #bb9dbd

active_border_color #878787
inactive_border_color #252530

color0   #252530
color8   #606079
color1   #d8647e
color9   #e08398
color2   #7fa563
color10  #99b782
color3   #f3be7c
color11  #f5cb96
color4   #6e94b2
color12  #8ba9c1
color5   #bb9dbd
color13  #c9b1ca
color6   #aeaed1
color14  #bebeda
color7   #cdcdcd
color15  #d7d7d7

active_tab_foreground    #cdcdcd
active_tab_background    #252530
inactive_tab_foreground  #606079
inactive_tab_background  #141415




# --- Symbols ---
symbol_map U+e000-U+e00a,U+ea60-U+ebeb,U+e0a0-U+e0c8,U+e0ca,U+e0cc-U+e0d4,U+e200-U+e2a9,U+e300-U+e3e3,U+e5fa-U+e6b1,U+e700-U+e7c5,U+f000-U+f2e0,U+f300-U+f372,U+f400-U+f532,U+f0001-U+f1af0 Hack Nerd Font Mono
