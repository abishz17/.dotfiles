# ============================================================
#  tmux.conf — Catppuccin Mocha
#  Aesthetic: dark, warm, powerline-style status bar
# ============================================================

# ── Terminal & Colors ────────────────────────────────────────
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB"
set -ag terminal-overrides ",alacritty:RGB"
set -as terminal-features ",xterm-256color:RGB"

# ── General ──────────────────────────────────────────────────
set -g escape-time 0                  # no delay for ESC in vim
set -g history-limit 100000
set -g mouse on
set -g focus-events on
set -g base-index 1                   # windows start at 1
set -g pane-base-index 1
set -g renumber-windows on            # auto-renumber when window closes
set -g set-titles on
set -g set-titles-string "#S / #W"
set -g status-interval 2

# ── Prefix ───────────────────────────────────────────────────
set -g prefix C-a
unbind C-b
bind C-a send-prefix

# ── Reload config ────────────────────────────────────────────
bind r source-file ~/.tmux.conf \; display-message " Config reloaded!"

# ── Splits (open in current path) ────────────────────────────
unbind '"'
unbind %
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
bind c new-window -c "#{pane_current_path}"

# ── Pane navigation (vim-style) ──────────────────────────────
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# ── Pane resize ──────────────────────────────────────────────
bind -n M-h resize-pane -L 3
bind -n M-j resize-pane -D 3
bind -n M-k resize-pane -U 3
bind -n M-l resize-pane -R 3

# ── Window navigation ────────────────────────────────────────
bind -n S-Left  previous-window
bind -n S-Right next-window
bind -r Tab     next-window
bind -r BTab    previous-window

# ── Session management ────────────────────────────────────────
bind S choose-session
bind K confirm-before -p "Kill session '#S'? (y/n)" kill-session

# ── Copy mode (vi) ───────────────────────────────────────────
setw -g mode-keys vi
bind Enter copy-mode
bind -T copy-mode-vi v   send -X begin-selection
bind -T copy-mode-vi C-v send -X rectangle-toggle
bind -T copy-mode-vi y   send -X copy-selection-and-cancel
bind -T copy-mode-vi H   send -X start-of-line
bind -T copy-mode-vi L   send -X end-of-line
bind -T copy-mode-vi Escape send -X cancel

# ── Silence ───────────────────────────────────────────────────
set -g visual-activity off
set -g visual-bell off
set -g visual-silence off
setw -g monitor-activity off
set -g bell-action none

# ============================================================
#  CATPPUCCIN MOCHA PALETTE
#  base    #1e1e2e   mantle  #181825   crust   #11111b
#  surface0 #313244  surface1 #45475a  surface2 #585b70
#  overlay0 #6c7086  overlay1 #7f849c  overlay2 #9399b2
#  subtext0 #a6adc8  subtext1 #bac2de  text    #cdd6f4
#  lavender #b4befe  blue    #89b4fa   sapphire #74c7ec
#  sky      #89dceb  teal    #94e2d5   green   #a6e3a1
#  yellow   #f9e2af  peach   #fab387   maroon  #eba0ac
#  red      #f38ba8  mauve   #cba6f7   pink    #f5c2e7
#  flamingo #f2cdcd  rosewater #f5e0dc
# ============================================================

# ── Catppuccin plugin config ─────────────────────────────────
set -g @catppuccin_flavor "mocha"
set -g @catppuccin_window_status_style "rounded"
set -g @catppuccin_window_number_position "left"
set -g @catppuccin_window_default_fill "number"
set -g @catppuccin_window_default_text "#W"
set -g @catppuccin_window_current_fill "number"
set -g @catppuccin_window_current_text "#W"
set -g @catppuccin_window_current_color "#cba6f7"   # mauve
set -g @catppuccin_window_text_color "#313244"       # surface0

# Status bar module config
set -g @catppuccin_status_background "default"
set -g @catppuccin_status_left_separator  ""
set -g @catppuccin_status_right_separator ""
set -g @catppuccin_status_right_separator_inverse "no"
set -g @catppuccin_status_fill "icon"
set -g @catppuccin_status_connect_separator "no"

# ── Pane borders ─────────────────────────────────────────────
set -g pane-border-style          "fg=#313244"        # surface0
set -g pane-active-border-style   "fg=#cba6f7"        # mauve

# ── Message style ─────────────────────────────────────────────
set -g message-style          "bg=#313244,fg=#cdd6f4"
set -g message-command-style  "bg=#313244,fg=#cdd6f4"

# ── Mode style (copy mode highlight) ─────────────────────────
setw -g mode-style "bg=#45475a,fg=#cdd6f4"

# ── Status bar ───────────────────────────────────────────────
set -g status on
set -g status-position bottom
set -g status-style "bg=#1e1e2e"

# Left side — session name pill
set -g status-left-length 100
set -g status-left "#[bg=#cba6f7,fg=#1e1e2e,bold] #(whoami) #[bg=#89b4fa,fg=#cba6f7,nobold]\
#[bg=#89b4fa,fg=#1e1e2e,bold]  #S #[bg=#1e1e2e,fg=#89b4fa,nobold] "

# Right side — date/time modules
set -g status-right-length 100
set -g status-right "#[fg=#313244,bg=#1e1e2e]#[bg=#313244,fg=#a6adc8] %H:%M \
#[fg=#45475a,bg=#313244]#[bg=#45475a,fg=#bac2de] %a %d %b \
#[fg=#cba6f7,bg=#45475a]#[bg=#cba6f7,fg=#1e1e2e,bold]  #h "

# ── Window list ──────────────────────────────────────────────
setw -g window-status-separator ""
setw -g window-status-format \
  "#[bg=#1e1e2e,fg=#45475a] #[bg=#313244,fg=#a6adc8] #I  #W #[bg=#1e1e2e,fg=#313244]"
setw -g window-status-current-format \
  "#[bg=#1e1e2e,fg=#cba6f7] #[bg=#cba6f7,fg=#1e1e2e,bold] #I  #W #[bg=#1e1e2e,fg=#cba6f7]"
setw -g window-status-activity-style "bg=#1e1e2e,fg=#f9e2af"

# ============================================================
#  PLUGINS
# ============================================================
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'christoomey/vim-tmux-navigator'   # seamless vim split nav
set -g @plugin 'tmux-plugins/tmux-yank'           # system clipboard yank
set -g @plugin 'tmux-plugins/tmux-resurrect'      # save/restore sessions
set -g @plugin 'tmux-plugins/tmux-continuum'      # auto-save sessions

# ── Resurrect / Continuum settings ───────────────────────────
set -g @resurrect-capture-pane-contents 'on'
set -g @resurrect-strategy-nvim 'session'         # restore nvim sessions
set -g @continuum-restore 'on'                    # auto-restore on start
set -g @continuum-save-interval '10'              # save every 10 min

# ── TPM bootstrap ────────────────────────────────────────────
run '~/.tmux/plugins/tpm/tpm'
